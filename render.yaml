services:
  - type: web
    name: phimas-backend
    runtime: docker
    rootDir: PHIMAS_PREDICTIVE_ANALYTICS/PHIMAS_PREDICTIVE_ANALYTICS
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    healthCheckPath: /healthz
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: AppStartup__SeedDemoData
        value: "false"
      - key: ConnectionStrings__DefaultConnection
        sync: false
